version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: pharmavox-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pharmavox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmavox"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: pharmavox-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/pharmavox
      - GEMINI_API_KEY=tu_clave_de_gemini_api_aqui
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
